<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  pointer-events: none;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  opacity: 0.9;
  z-index: 1;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(120vh) scale(0.3);
    opacity: 0;
  }
}

/* 📱 PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
}

.hidden {
  display: none;
}

/* 🎴 IMÁGENES */
.envelope, .card-img {
  width: 80%;
  max-width: 400px;
  display: block;
  margin: auto;
  transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

/* 🖱️ HOVER SOLO MOUSE */
@media (hover: hover) and (pointer: fine) {
  .card-img:hover {
    transform: scale(0.95);
    filter: brightness(0.9);
  }
}

/* 📱 TAP */
.card-img:active {
  transform: scale(0.92);
  filter: brightness(1.15);
  box-shadow:
    0 0 12px rgba(200, 178, 115, 0.6),
    0 0 25px rgba(200, 178, 115, 0.4);
}

/* 🔘 BOTÓN */
.button {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: white;
  text-decoration: none;
  background: #C8B273;
  padding: 10px 20px;
  border-radius: 10px;
}

</style>
</head>

<body>

<!-- 📩 PANTALLA 1 -->
<div id="home" class="screen">
  <img src="Untitled1419_20260504184749.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 PANTALLA 2 -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img" onclick="inviteStars(event)">

  <a class="button" href="https://maps.google.com" target="_blank">
    Dirección
  </a>

</div>

<script>

/* ⭐ CREAR ESTRELLA */
function createStar(x, y, behind = false) {
  const star = document.createElement("div");
  star.className = "star";

  star.style.left = x + "px";
  star.style.top = y + "px";

  // 🌟 caída más lenta
  const duration = Math.random() * 3 + 3;
  star.style.animationDuration = duration + "s";

  if (behind) {
    star.style.zIndex = "0";
  }

  document.body.appendChild(star);

  setTimeout(() => star.remove(), duration * 1000);
}

/* 📱 TOCAR PANTALLA = ESTRELLAS */
document.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  createStar(t.clientX, t.clientY);
});

/* 🖱️ CLICK PC */
document.addEventListener("click", (e) => {
  createStar(e.clientX, e.clientY);
});

/* 🎴 ABRIR INVITACIÓN + EXPLOSIÓN */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");

  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      createStar(
        Math.random() * window.innerWidth,
        Math.random() * window.innerHeight,
        true
      );
    }, i * 70);
  }
}

/* 📱 ESTRELLAS AL TOCAR INVITACIÓN */
function inviteStars(e) {
  createStar(e.clientX, e.clientY, true);
}

</script>

</body>
</html>
