<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<!-- FONT BOTÓN -->
<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hidden {
  display: none;
}

/* 📩 SOBRE */
.envelope {
  width: 260px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 300px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.card-img:active {
  transform: scale(0.92);
  filter: brightness(0.85);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
}

/* ⭐ ESTRELLAS DORADAS */
.star {
  position: fixed;
  pointer-events: none;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  opacity: 0.9;
  animation: fade 1.2s linear forwards;
}

@keyframes fade {
  to {
    transform: translateY(25px) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<!-- ⭐ ESTRELLAS -->
<script>
function createStar() {
  const star = document.createElement("div");
  star.className = "star";

  const x = Math.random() * window.innerWidth;
  star.style.left = x + "px";
  star.style.top = "0px";

  document.body.appendChild(star);

  setTimeout(() => star.remove(), 2500);
}

setInterval(createStar, 180);
</script>

<!-- 📩 PANTALLA 1 -->
<div id="home" class="screen">
  <img src="Untitled1419_20260504184749.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 PANTALLA 2 -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.google.com" target="_blank">
    Dirección
  </a>

</div>

<script>
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");
}
</script>

</body>
</html>
