<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación de Graduación</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #d4af37; /* 💛 dorado plano */
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      overflow: hidden;
      color: #1a1a1a;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      margin-bottom: 30px;
      font-size: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .info {
      margin: 12px 0;
      font-size: 18px;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .button:hover {
      transform: scale(1.05);
    }

    /* ⭐ ESTRELLAS */
    .star {
      position: fixed;
      pointer-events: none;
      width: 40px;
      height: 40px;
      background: #000;
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
      opacity: 0.9;
      animation: fall 1.2s linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(30px) scale(0);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎓 Graduation Party 🎓</h1>
    <p class="subtitle">You’re invited to celebrate with me</p>

    <div class="card">
      <p class="info">📅 June 15, 2026</p>
      <p class="info">⏰ 6:00 PM</p>
      <p class="info">📍 Tucson, Arizona</p>

      <a class="button" href="https://maps.google.com" target="_blank">
        Open Location
      </a>
    </div>
  </div>

  <!-- ⭐ SCRIPT ESTRELLAS -->
  <script>
    function createStar(x, y) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = x + "px";
      star.style.top = y + "px";
      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 1200);
    }

    // 💻 Mouse (PC)
    document.addEventListener("mousemove", (e) => {
      createStar(e.clientX, e.clientY);
    });

    // 📱 Mobile (caen siempre)
    setInterval(() => {
      const x = Math.random() * window.innerWidth;
      createStar(x, 0);
    }, 200);
  </script>

</body>
</html>
