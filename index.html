<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🌈 FONDO ANIMADO */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0;
  transition: opacity 2s ease;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 2;
}

.hidden {
  display: none;
}

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 850px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.card-img:active {
  transform: scale(0.92);
  filter: brightness(0.85);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
  transition: all 0.3s ease;
}

.button:hover {
  background: transparent;
  color: white;
  border: 2px solid white;
}

/* 🎵 CONTROLES MÚSICA */
.music-controls {
  position: fixed;
  bottom: 20px;
  display: flex;
  gap: 15px;
  z-index: 3;
}

.music-btn {
  padding: 16px 30px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  cursor: pointer;
}

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  animation: fall 3s linear forwards;
  z-index: 1;
  opacity: 0.9;
}

@keyframes fall {
  to {
    transform: translateY(110vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<!-- 🌈 FONDO -->
<div id="bg"></div>

<!-- 🎵 AUDIO -->
<audio id="music" src="ribslorse.m4a" preload="auto" loop></audio>

<!-- 📩 PANTALLA 1 -->
<div id="home" class="screen">
  <img src="Untitled1419_20260507162913.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 PANTALLA 2 -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <div class="music-controls">
    <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
    <button class="music-btn" onclick="restartMusic()">Restart</button>
  </div>

</div>

<script>

/* ⭐ ESTRELLAS (tamaño random) */
function createStar() {
  const star = document.createElement("div");
  star.className = "star";

  const size = Math.random() * 25 + 10; // 👈 tamaños variados
  star.style.width = size + "px";
  star.style.height = size + "px";

  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.top = "0px";

  star.style.opacity = Math.random() * 0.8 + 0.2;

  document.body.appendChild(star);

  setTimeout(() => star.remove(), 3000);
}

setInterval(createStar, 120);


/* 🌈 FONDO DINÁMICO */
const bg = document.getElementById("bg");

const gradients = [
  "linear-gradient(to bottom, black, #ff0000)",
  "linear-gradient(to bottom, black, #00ff00)",
  "linear-gradient(to bottom, black, #0066ff)",
  "linear-gradient(to bottom, black, #ff7a00)",
  "linear-gradient(to bottom, black, #a100ff)",
];

let i = 0;

function changeBackground() {
  bg.style.opacity = 0;

  setTimeout(() => {
    bg.style.background = gradients[i];
    bg.style.opacity = 1;

    i = (i + 1) % gradients.length;
  }, 800);
}

setInterval(changeBackground, 3500);
changeBackground();


/* 🎵 MÚSICA */
const music = document.getElementById("music");
const btn = document.getElementById("playPauseBtn");
let started = false;

function toggleMusic() {
  if (music.paused) {
    if (!started) {
      music.currentTime = 47;
      started = true;
    }

    music.play();
    btn.textContent = "Pause";
  } else {
    music.pause();
    btn.textContent = "Play";
  }
}

function restartMusic() {
  started = true;
  music.play();
  btn.textContent = "Pause";
}

/* 🎴 ABRIR INVITACIÓN */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");

  if (!started) {
    music.currentTime = 47;
    started = true;
  }

  music.play().catch(() => {});
  btn.textContent = "Pause";
}

</script>

</body>
</html>
