<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Graduation Party</title>

<!-- FONT GRADUATION -->
<link href="https://fonts.cdnfonts.com/css/graduation-2" rel="stylesheet">

<!-- MONTSERRAT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 0;
  background: #C8B273;
  overflow: hidden;
}

/* ⭐ ESTRELLAS (FONDO) */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #000;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  animation: fall 2.5s linear forwards;
  z-index: 1;
}

@keyframes fall {
  to {
    transform: translateY(calc(100vh - 180px)) scale(0);
    opacity: 0;
  }
}

/* 📱 CONTENEDOR CENTRAL */
.wrapper {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🪟 GLASS CARD */
.card {
  width: 320px;
  padding: 30px;
  border-radius: 20px;

  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  color: white;
  text-align: center;
}

/* 🎓 TÍTULO */
.title {
  font-family: 'Graduation', sans-serif;
  font-size: 48px;
  margin-bottom: 15px;
}

/* ✍️ CONTENIDO */
.info {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 18px;
  margin: 10px 0;
}

/* BOTONES */
.button {
  margin-top: 15px;
  display: inline-block;
  padding: 10px 20px;
  border-radius: 20px;
  background: #fff;
  color: #000;
  text-decoration: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
}

/* BOTÓN SECUNDARIO */
.secondary {
  background: transparent;
  border: 1px solid white;
  color: white;
}

</style>
</head>

<body>

<!-- ⭐ CONTENIDO -->
<div class="wrapper">
  <div class="card">

    <div class="title">Grad Party 🎓</div>

    <div class="info">📅 June 15, 2026</div>
    <div class="info">⏰ 6:00 PM</div>
    <div class="info">📍 Tucson, Arizona</div>

    <a class="button" href="https://maps.google.com" target="_blank">
      Dirección
    </a>

    <br>

    <a class="button secondary" href="#">
      Dress Code
    </a>

  </div>
</div>

<!-- ⭐ SCRIPT ESTRELLAS -->
<script>
function createStar() {
  const star = document.createElement("div");
  star.className = "star";

  const x = Math.random() * window.innerWidth;
  star.style.left = x + "px";
  star.style.top = "0px";

  document.body.appendChild(star);

  setTimeout(() => {
    star.remove();
  }, 2500);
}

setInterval(createStar, 180);
</script>

</body>
</html>
