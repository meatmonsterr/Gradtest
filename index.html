<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<!-- FONT BOTÓN -->
<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hidden {
  display: none;
}

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 800px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.card-img:active {
  transform: scale(0.92);
  filter: brightness(0.85);
}
  #musicControls {
  position: fixed;
  bottom: 15px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  z-index: 999;
}

#musicControls button {
  background: #C8B273;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  font-size: 12px;
  cursor: pointer;
}

#musicControls button:active {
  transform: scale(0.95);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
}

/* ⭐ ESTRELLAS DORADAS */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #C8B273; /* 💛 dorado */
   clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  animation: fall 2.5s linear forwards;
  z-index: 1;
  opacity: 0.9;
}

@keyframes fall {
  to {
    transform: translateY(calc(100vh - 150px)) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>
<audio id="music" src="ribslorde.m4a" preload="auto" loop></audio>
  
<!-- ⭐ ESTRELLAS -->
<script>
function createStar() {
  const star = document.createElement("div");
  star.className = "star";

  const x = Math.random() * window.innerWidth;
  star.style.left = x + "px";
  star.style.top = "0px";

  document.body.appendChild(star);

  setTimeout(() => star.remove(), 2500);
}

setInterval(createStar, 180);

  const music = document.getElementById("music");

/* ▶️ play */
function playMusic() {
  music.play();
}

/* ⏸ pause */
function pauseMusic() {
  music.pause();
}

/* 🔁 restart */
function restartMusic() {
  music.currentTime = 0;
  music.play();
}

/* 🎴 cuando abres invitación */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");

  music.play().catch(() => {});
}
</script>

<!-- 📩 PANTALLA 1 -->
<div id="home" class="screen">
  <img src="Untitled1419_20260504184749.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 PANTALLA 2 -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.google.com" target="_blank">
    Dirección
  </a>

</div>

<script>
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");
}
</script>
  <script>
function createStar(x, y, behind = false) {
  const star = document.createElement("div");
  star.className = "star";

  star.style.left = x + "px";
  star.style.top = y + "px";

  // ⭐ más lento (3s a 6s)
  const duration = Math.random() * 3 + 3;
  star.style.animationDuration = duration + "s";

  // ⭐ si es detrás de la carta
  if (behind) {
    star.style.zIndex = "0";
  }

  document.body.appendChild(star);

  setTimeout(() => star.remove(), duration * 1000);
}

/* ⭐ estrellas al tocar cualquier parte de la pantalla */
document.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  createStar(touch.clientX, touch.clientY);
});

/* 🖱️ opcional: también en click en PC */
document.addEventListener("click", (e) => {
  createStar(e.clientX, e.clientY);
});

/* 📱 estrellas al tocar la invitación */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");

  // ⭐ efecto extra al abrir
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      createStar(
        Math.random() * window.innerWidth,
        Math.random() * window.innerHeight,
        true
      );
    }, i * 80);
  }
}
</script>

</body>
</html>
