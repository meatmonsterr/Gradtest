<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación de Graduación</title>

  <link href="https://fonts.cdnfonts.com/css/graduation-2" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #C8B273;
      font-family: 'Graduation', sans-serif;
      overflow: hidden;
      color: #1a1a1a;
      text-align: center;
    }

    .container {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
    }

    .info {
      margin: 10px 0;
      font-size: 18px;
    }

    /* ⭐ ESTRELLAS */
    .star {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #000;
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
      animation: fade 1.5s linear forwards;
      pointer-events: none;
    }

    @keyframes fade {
      to {
        transform: translateY(30px) scale(0);
        opacity: 0;
      }
    }

    /* 🖤 TIRA INFERIOR */
    .ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #000;
      color: #C8B273;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      padding: 12px 0;
    }

    .ticker-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 12s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Graduation Party 🎓</h1>
    <p class="subtitle">You’re invited to celebrate with me</p>

    <div class="card">
      <p class="info">📅 June 15, 2026</p>
      <p class="info">⏰ 6:00 PM</p>
      <p class="info">📍 Tucson, Arizona</p>
    </div>
  </div>

  <!-- 🖤 TICKER -->
  <div class="ticker">
    <div class="ticker-content">
      Nombre ⭐ Nombre ⭐ Nombre ⭐ Nombre ⭐ Nombre ⭐ Nombre ⭐ Nombre ⭐ Nombre ⭐
    </div>
  </div>

  <!-- ⭐ STARS -->
  <script>
    function createStar(x, y) {
      const star = document.createElement("div");
      star.className = "star";

      const mid = window.innerHeight / 2;
      const randomY = Math.random() * mid;

      star.style.left = x + "px";
      star.style.top = (y || randomY) + "px";

      document.body.appendChild(star);

      setTimeout(() => star.remove(), 1500);
    }

    document.addEventListener("mousemove", (e) => {
      createStar(e.clientX, e.clientY);
    });

    setInterval(() => {
      const x = Math.random() * window.innerWidth;
      createStar(x);
    }, 250);
  </script>

</body>
</html>
