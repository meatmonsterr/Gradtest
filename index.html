<!DOCTYPE html>
<html lang="es">
<head>
<meta property="og:title" content="Invitation">
<meta property="og:description" content="You are invited ✨">
<meta property="og:image" content="Untitled1423_20260507165155.png">
<link rel="icon" href="Untitled1424_20260507165226.png">
<meta charset="UTF-8">
<title>Invitation</title>

<!-- FONT BOTÓN -->
<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hidden {
  display: none;
}

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 850px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.card-img:active {
  transform: scale(0.92);
  filter: brightness(0.85);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
  transition: all 0.3s ease;
}

/* ✨ HOVER DIRECCIÓN */
.button:hover {
  background: transparent;
  color: white;
  border: 2px solid white;
}

/* 🎵 CONTROLES MÚSICA */
.music-controls {
  position: fixed;
  bottom: 20px;
  display: flex;
  gap: 15px;
}

/* BOTONES MÚSICA */
.music-btn {
  padding: 16px 30px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  cursor: pointer;
}

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  animation: fall 2.5s linear forwards;
  z-index: 1;
  opacity: 0.9;
}

@keyframes fall {
  to {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="music" src="ribslorse.m4a" preload="auto" loop></audio>

<!-- 📩 PANTALLA 1 -->
<div id="home" class="screen">
  <img src="Untitled1419_20260507165820.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 PANTALLA 2 -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <!-- 🎵 BOTONES MÚSICA -->
  <div class="music-controls">
    <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
    <button class="music-btn" onclick="restartMusic()">Restart</button>
  </div>

</div>

<script>

/* ⭐ ESTRELLAS */
function createStar() {
  const star = document.createElement("div");
  star.className = "star";

  const x = Math.random() * window.innerWidth;
  star.style.left = x + "px";
  star.style.top = "0px";

  document.body.appendChild(star);

  setTimeout(() => star.remove(), 2500);
}

setInterval(createStar, 180);

/* 🎵 MÚSICA */
const music = document.getElementById("music");
const btn = document.getElementById("playPauseBtn");
let started = false;

/* ▶️ / ⏸ toggle */
function toggleMusic() {
  if (music.paused) {
    if (!started) {
      music.currentTime = 47;
      started = true;
    }

    music.play();
    btn.textContent = "Pause";
  } else {
    music.pause();
    btn.textContent = "Play";
  }

}

/* 🔁 restart */

function restartMusic() {
  started = true;
  music.play();
  btn.textContent = "Pause";

}

/* 🎴 ABRIR INVITACIÓN */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");
  if (!started) {
    music.currentTime = 47;
    started = true;
  }

  music.play().catch(() => {});
  btn.textContent = "Pause";
}

</script>

</body>
</html>
