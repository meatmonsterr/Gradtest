<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* 📸 ANIMACIÓN CENTRAL */
.carousel {
  position: absolute;
  display: none;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100vh;
}

.card {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 15px;
  object-fit: cover;
  transition: transform 0.6s ease, opacity 0.6s ease;
}

/* posiciones */
.card.center { transform: scale(1.2); z-index: 5; }
.card.left { transform: translateX(-160px) scale(0.9); opacity: 0.6; }
.card.right { transform: translateX(160px) scale(0.9); opacity: 0.6; }
.card.hidden { opacity: 0; }

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 850px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
  transition: all 0.3s ease;
}

.button:hover {
  background: transparent;
  color: white;
  border: 2px solid white;
}

/* 🎵 CONTROLES */
.music-controls {
  position: fixed;
  bottom: 20px;
  display: flex;
  gap: 15px;
}

.music-btn {
  padding: 16px 30px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
}

/* 🖼️ GALERÍA */
.gallery {
  width: 100%;
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px;
}

.gallery img {
  height: 150px;
  border-radius: 10px;
}

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,
    50% 70%,21% 91%,32% 57%,2% 35%,39% 35%
  );
  animation: fall 2.5s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<audio id="music" src="ribslorse.m4a" loop></audio>

<!-- 📩 ENVELOPE -->
<div id="home" class="screen">
  <img src="Untitled1419_20260504184749.png" class="envelope" onclick="openInvite()">
</div>

<!-- 📸 ANIMACIÓN -->
<div id="carousel" class="carousel">
  <img src="IMG_3569.jpeg" class="card center">
  <img src="IMG_3570.jpeg" class="card right">
  <img src="IMG_3569.jpeg" class="card left">
</div>

<!-- 🎴 INVITACIÓN -->
<div id="invitation" class="screen" style="display:none;">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <div class="gallery">
    <img src="IMG_3569.jpeg">
    <img src="IMG_3570.jpeg">
    <img src="IMG_3569.jpeg">
    <img src="IMG_3570.jpeg">
  </div>

  <div class="music-controls">
    <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
    <button class="music-btn" onclick="restartMusic()">Restart</button>
  </div>

</div>

<script>

/* ⭐ ESTRELLAS */
setInterval(()=>{
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2500);
},180);

/* 🎵 AUDIO */
const music=document.getElementById("music");
const btn=document.getElementById("playPauseBtn");

function fadeIn(){
  music.volume=0;
  let v=0;
  const f=setInterval(()=>{
    v+=0.03;
    music.volume=v;
    if(v>=1) clearInterval(f);
  },120);
}

function toggleMusic(){
  if(music.paused){
    music.play();
    btn.textContent="Pause";
  } else {
    music.pause();
    btn.textContent="Play";
  }
}

function restartMusic(){
  music.currentTime=47;
  music.play();
  fadeIn();
  btn.textContent="Pause";
}

/* 🎴 ABRIR */
function openInvite(){

  document.getElementById("home").style.display="none";
  const carousel=document.getElementById("carousel");
  carousel.style.display="flex";

  music.currentTime=47;
  music.play();
  fadeIn();
  btn.textContent="Pause";

  const cards=document.querySelectorAll(".card");

  let i=0;
  setInterval(()=>{
    cards.forEach(c=>c.className="card hidden");

    cards[i%3].className="card center";
    cards[(i+1)%3].className="card right";
    cards[(i+2)%3].className="card left";

    i++;
  },1200);

  setTimeout(()=>{
    carousel.style.display="none";
    document.getElementById("invitation").style.display="flex";
  },5000);
}

</script>

</body>
</html>
