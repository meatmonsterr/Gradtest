<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* 🎞️ SLIDESHOW */
#slideshow {
  position: absolute;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: scale(1.1);
  transition: opacity 1s ease, transform 2s ease;
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
}

/* 🎴 TARJETA */
.card-img {
  width: 850px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
  transition: all 0.3s ease;
}

.button:hover {
  background: transparent;
  color: white;
  border: 2px solid white;
}

/* 🎵 CONTROLES */
.music-controls {
  position: fixed;
  bottom: 20px;
  display: flex;
  gap: 15px;
}

.music-btn {
  padding: 16px 30px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
}

/* 🖼️ GALERÍA */
.gallery {
  width: 100%;
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px;
}

.gallery img {
  height: 150px;
  border-radius: 10px;
}

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,
    50% 70%,21% 91%,32% 57%,2% 35%,39% 35%
  );
  animation: fall 2.5s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<audio id="music" src="ribslorse.m4a" loop></audio>

<!-- 🎞️ SLIDESHOW -->
<div id="slideshow">
  <img src="IMG_3569.jpeg" class="slide active">
  <img src="IMG_3570.jpeg" class="slide">
</div>

<!-- 🎴 INVITACIÓN -->
<div id="invitation" class="screen" style="display:none;">

  <img src="Untitled1421_20260504195117.png" class="card-img">

  <a class="button" href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <!-- 🖼️ GALERÍA -->
  <div class="gallery">
    <img src="IMG_3569.jpeg">
    <img src="IMG_3570.jpeg">
  </div>

  <div class="music-controls">
    <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
    <button class="music-btn" onclick="restartMusic()">Restart</button>
  </div>

</div>

<script>

/* ⭐ ESTRELLAS */
setInterval(() => {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random()*100+"vw";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2500);
},180);

/* 🎵 AUDIO */
const music = document.getElementById("music");
const btn = document.getElementById("playPauseBtn");

let started = false;

/* FADE */
function fadeInAudio() {
  music.volume = 0;
  let v = 0;
  const fade = setInterval(()=>{
    v += 0.02;
    music.volume = v;
    if(v>=1) clearInterval(fade);
  },120);
}

function toggleMusic() {
  if(music.paused){
    music.play();
    btn.textContent="Pause";
  } else {
    music.pause();
    btn.textContent="Play";
  }
}

function restartMusic(){
  music.currentTime=47;
  music.play();
  fadeInAudio();
  btn.textContent="Pause";
}

/* 🎞️ SLIDESHOW */
const slides = document.querySelectorAll(".slide");
let index = 0;

function nextSlide(){
  slides[index].classList.remove("active");
  index = (index+1)%slides.length;
  slides[index].classList.add("active");
}

setInterval(nextSlide, 2500);

/* 🚀 INICIO */
setTimeout(()=>{

  document.getElementById("slideshow").style.opacity = 0;

  setTimeout(()=>{
    document.getElementById("slideshow").style.display="none";
    document.getElementById("invitation").style.display="flex";
  },1000);

},6000);

/* 🎵 AUTO START */
setTimeout(()=>{
  music.currentTime=47;
  music.play();
  fadeInAudio();
  btn.textContent="Pause";
},500);

</script>

</body>
</html>
