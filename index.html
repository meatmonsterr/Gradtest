<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* PANTALLAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  opacity: 1;
  transition: opacity 0.6s ease;
}

.hidden {
  display: none;
}

.fade-out {
  opacity: 0;
}

/* 📩 SOBRE */
.envelope {
  width: 700px;
  cursor: pointer;
  transition: transform 0.5s ease, opacity 0.5s ease;
}

.envelope.opening {
  transform: scale(1.15);
  opacity: 0;
}

/* 🎴 TARJETA */
.card-img {
  width: 850px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card-img:hover {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.card-img:active {
  transform: scale(0.92);
  filter: brightness(0.85);
}

/* BOTÓN */
.button {
  padding: 12px 30px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  font-style: italic;
  transition: all 0.3s ease;
}

.button:hover {
  background: transparent;
  color: white;
  border: 2px solid white;
}

/* 🎵 CONTROLES */
.music-controls {
  position: fixed;
  bottom: 20px;
  display: flex;
  gap: 15px;
}

.music-btn {
  padding: 16px 30px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  cursor: pointer;
}

/* ⭐ ESTRELLAS */
.star {
  position: fixed;
  width: 30px;
  height: 30px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  animation: fall 2.5s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<audio id="music" src="ribslorse.m4a" preload="auto" loop></audio>

<!-- 📩 ENVELOPE -->
<div id="home" class="screen">
  <img id="envelope" src="Untitled1419_20260504184749.png" class="envelope" onclick="openInvite()">
</div>

<!-- 🎴 INVITACIÓN -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1421_20260504195117.png" class="card-img" onclick="goHome()">

  <a class="button" href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <div class="music-controls">
    <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
    <button class="music-btn" onclick="restartMusic()">Restart</button>
  </div>

</div>

<script>

/* ⭐ ESTRELLAS */
function createStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 2500);
}
setInterval(createStar, 180);

/* 🎵 AUDIO */
const music = document.getElementById("music");
const btn = document.getElementById("playPauseBtn");

let started = false;
let fadeInterval;

/* 🔊 FADE IN REAL */
function fadeInAudio() {
  music.volume = 0;

  clearInterval(fadeInterval);

  fadeInterval = setInterval(() => {
    if (music.volume < 0.95) {
      music.volume += 0.03; // más suave
    } else {
      music.volume = 1;
      clearInterval(fadeInterval);
    }
  }, 120);
}

/* ▶️ / ⏸ */
function toggleMusic() {
  if (music.paused) {

    if (!started) {
      music.currentTime = 47;
      started = true;
    }

    music.play();
    fadeInAudio();
    btn.textContent = "Pause";

  } else {
    music.pause();
    btn.textContent = "Play";
  }
}

/* 🔁 restart */
function restartMusic() {
  music.currentTime = 47;
  started = true;
  music.play();
  fadeInAudio();
  btn.textContent = "Pause";
}

/* ✉️ ABRIR INVITACIÓN */
function openInvite() {

  const home = document.getElementById("home");
  const invite = document.getElementById("invitation");
  const envelope = document.getElementById("envelope");

  envelope.classList.add("opening");

  setTimeout(() => {

    home.classList.add("fade-out");

    setTimeout(() => {
      home.classList.add("hidden");
      invite.classList.remove("hidden");

      invite.style.opacity = 0;
      setTimeout(() => invite.style.opacity = 1, 50);

    }, 600);

  }, 400);

  if (!started) {
    music.currentTime = 47;
    started = true;
  }

  music.play();
  fadeInAudio();
  btn.textContent = "Pause";
}

/* 🔙 REGRESAR AL SOBRE */
function goHome() {

  const home = document.getElementById("home");
  const invite = document.getElementById("invitation");
  const envelope = document.getElementById("envelope");

  invite.classList.add("fade-out");

  setTimeout(() => {
    invite.classList.add("hidden");
    invite.classList.remove("fade-out");

    home.classList.remove("hidden");

    envelope.classList.remove("opening");
    home.style.opacity = 1;

  }, 600);

  music.pause();
  btn.textContent = "Play";
}

</script>

</body>
</html>
