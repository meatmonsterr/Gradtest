<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación de Graduación</title>

  <!-- FONT GRADUATION -->
  <link href="https://fonts.cdnfonts.com/css/graduation-2" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #C8B273;
      font-family: 'Graduation', sans-serif;
      text-align: center;
      overflow: hidden;
      color: #1a1a1a;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-family: 'Graduation', sans-serif;
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .info {
      margin: 10px 0;
      font-size: 18px;
    }

    /* ⭐ ESTRELLAS */
    .star {
      position: fixed;
      pointer-events: none;
      width: 30px;
      height: 30px;
      background: #000;
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
      opacity: 0.9;
      animation: fade 1.5s linear forwards;
    }

    @keyframes fade {
      to {
        transform: translateY(30px) scale(0);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Graduation Party 🎓</h1>
    <p class="subtitle">You’re invited to celebrate with me</p>

    <div class="card">
      <p class="info">📅 June 15, 2026</p>
      <p class="info">⏰ 6:00 PM</p>
      <p class="info">📍 Tucson, Arizona</p>
    </div>
  </div>

  <!-- ⭐ STARS SCRIPT -->
  <script>
    function createStar(x, y) {
      const star = document.createElement("div");
      star.className = "star";

      // ⭐ SOLO arriba de la mitad de la pantalla
      const midPoint = window.innerHeight / 2;
      const randomY = Math.random() * midPoint;

      star.style.left = x + "px";
      star.style.top = (y || randomY) + "px";

      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 1500);
    }

    // 💻 mouse (PC)
    document.addEventListener("mousemove", (e) => {
      createStar(e.clientX, e.clientY);
    });

    // 📱 mobile (solo arriba de la mitad)
    setInterval(() => {
      const x = Math.random() * window.innerWidth;
      createStar(x);
    }, 250);
  </script>

</body>
</html>
